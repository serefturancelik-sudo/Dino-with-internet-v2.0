<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dino: Ay Operasyonu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #game-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0b0f1a;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #141a2b;
      touch-action: none;
    }
    #hud {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
      color: #b7d0f0;
      font-size: 0.95rem;
      font-weight: bold;
      background: linear-gradient(180deg, rgba(11,15,26,0.9) 0%, transparent 100%);
    }
    #hud > div { pointer-events: auto; display: flex; gap: 12px; align-items: center; }
    .hud-btn {
      background: rgba(20, 30, 50, 0.85);
      border: 1px solid #3a5a8a;
      border-radius: 30px;
      padding: 6px 16px;
      color: #b7d0f0;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      pointer-events: auto;
    }
    .hud-btn:hover { background: #2a4a7a; color: white; }
    #stage-indicator {
      background: rgba(15, 24, 42, 0.85);
      padding: 6px 18px;
      border-radius: 30px;
      border: 1px solid #2a4a7a;
    }
  </style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  <div id="hud">
    <div>
      <span id="stage-indicator">🌙 STAGE 1</span>
      <span id="scoreDisplay">🏆 0</span>
    </div>
    <div>
      <button class="hud-btn" id="storyBtn">HİKAYE</button>
      <button class="hud-btn" id="cheatBtn">HİLE</button>
    </div>
  </div>
</div>

<script>
  (function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const stageIndicator = document.getElementById('stage-indicator');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const storyBtn = document.getElementById('storyBtn');
    const cheatBtn = document.getElementById('cheatBtn');

    let currentStage = 1;
    let score = 0;
    let godMode = false;
    let frameCount = 0;
    let gameOver = false;

    const player = { x: 80, y: 380, w: 28, h: 32, vy: 0, onGround: true };
    let obstacles = [];
    let bombs = [];

    const keys = { left: false, right: false, up: false, space: false };
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
      if (e.key === 'ArrowUp' || e.key === 'w') keys.up = true;
      if (e.key === ' ') { e.preventDefault(); keys.space = true; }
    });
    document.addEventListener('keyup', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
      if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
      if (e.key === 'ArrowUp' || e.key === 'w') keys.up = false;
      if (e.key === ' ') keys.space = false;
    });

    cheatBtn.addEventListener('click', () => {
      godMode = !godMode;
      alert(godMode ? '🛡️ ÖLÜMSÜZLÜK AÇILDI!' : '⚔️ ÖLÜMSÜZLÜK KAPANDI!');
    });

    storyBtn.addEventListener('click', () => {
      alert('Dino: Ay Operasyonu\n- Ok tuşları / WASD ile hareket.\n- Boşluk ile zıpla.');
    });

    function setStage(stage) {
      currentStage = stage;
      obstacles = [];
      bombs = [];
      player.y = 380;
      player.vy = 0;
      stageIndicator.textContent = stage === 1 ? '🌙 STAGE 1' : '📶 STAGE 2';
    }

    function update() {
      if (gameOver) return;
      frameCount++;

      if (currentStage === 1) {
        if ((keys.up || keys.space) && player.onGround) {
          player.vy = -10;
          player.onGround = false;
        }
        player.vy += 0.5;
        player.y += player.vy;
        if (player.y >= 380) { player.y = 380; player.vy = 0; player.onGround = true; }

        if (frameCount % 70 === 0) {
          obstacles.push({ x: 850, y: 380, w: 18, h: 28 });
        }
        for (let i = obstacles.length - 1; i >= 0; i--) {
          obstacles[i].x -= 5;
          if (obstacles[i].x < -30) { obstacles.splice(i, 1); score += 10; }
          if (!godMode && rectCollide(player, obstacles[i])) {
            gameOver = true;
            setTimeout(() => { gameOver = false; obstacles = []; score = 0; }, 800);
          }
        }
        if (score >= 50) setStage(2);
      } 
      else if (currentStage === 2) {
        if (keys.left) player.x = Math.max(20, player.x - 6);
        if (keys.right) player.x = Math.min(760, player.x + 6);

        if (frameCount % 45 === 0) {
          bombs.push({ x: Math.random() * 750, y: -20, w: 24, h: 24 });
        }
        for (let i = bombs.length - 1; i >= 0; i--) {
          bombs[i].y += 4;
          if (bombs[i].y > 520) { bombs.splice(i, 1); score += 5; }
          if (!godMode && rectCollide(player, bombs[i])) {
            gameOver = true;
            setTimeout(() => { gameOver = false; bombs = []; setStage(1); score = 0; }, 800);
          }
        }
      }

      scoreDisplay.textContent = `🏆 ${score} ${godMode ? '🛡️' : ''}`;
    }

    function rectCollide(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function draw() {
      ctx.fillStyle = '#141a2b';
      ctx.fillRect(0, 0, 800, 500);

      ctx.strokeStyle = '#1f2a44';
      ctx.lineWidth = 1;
      for (let i = 0; i < 800; i += 40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 500); ctx.stroke();
      }
      for (let i = 0; i < 500; i += 40) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(800, i); ctx.stroke();
      }

      ctx.strokeStyle = '#3a5a8a';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, 412); ctx.lineTo(800, 412); ctx.stroke();

      ctx.fillStyle = godMode ? '#ffeb3b' : '#4caf50';
      ctx.fillRect(player.x, player.y, player.w, player.h);

      if (currentStage === 1) {
        for (let o of obstacles) {
          ctx.fillStyle = '#8d6e63';
          ctx.fillRect(o.x, o.y, o.w, o.h);
        }
      } else if (currentStage === 2) {
        for (let b of bombs) {
          ctx.fillStyle = '#ff5252';
          ctx.beginPath(); ctx.arc(b.x + 12, b.y + 12, 12, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#ffab40';
          ctx.fillRect(b.x + 10, b.y - 4, 4, 8);
        }
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    setStage(1);
    loop();
  })();
</script>
</body>
</html>
